<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wellness Chatbot — Test UI</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f4f6f9; color: #1a1a2e; min-height: 100vh; }

    header {
      background: #1a1a2e; color: #fff; padding: 14px 24px;
      display: flex; align-items: center; gap: 12px;
    }
    header h1 { font-size: 1.1rem; font-weight: 600; }
    header span { font-size: 0.8rem; opacity: 0.6; }

    .layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      padding: 20px;
      max-width: 1300px;
      margin: 0 auto;
    }
    .layout-full { grid-column: 1 / -1; }
    @media (max-width: 800px) { .layout { grid-template-columns: 1fr; } .layout-full { grid-column: 1; } }

    /* Document table */
    .doc-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    .doc-table th { background: #f8fafc; color: #64748b; font-weight: 600; text-align: left; padding: 8px 12px; border-bottom: 2px solid #e2e8f0; }
    .doc-table td { padding: 8px 12px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }
    .doc-table tr:hover td { background: #f8fafc; }
    .doc-type-badge { background: #e0e7ff; color: #3730a3; padding: 2px 8px; border-radius: 10px; font-size: 0.75rem; font-weight: 500; }
    .btn-delete { background: #fee2e2; color: #dc2626; border: none; border-radius: 6px; padding: 4px 12px; cursor: pointer; font-size: 0.8rem; font-weight: 500; }
    .btn-delete:hover { background: #fecaca; }
    .btn-refresh { background: #f1f5f9; color: #475569; border: none; border-radius: 6px; padding: 4px 10px; cursor: pointer; font-size: 0.8rem; margin-left: 8px; }
    .doc-empty { text-align: center; color: #94a3b8; padding: 24px; font-size: 0.9rem; }

    .panel {
      background: #fff; border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,.07);
      display: flex; flex-direction: column; overflow: hidden;
    }
    .panel-header {
      padding: 14px 18px; font-weight: 600; font-size: 0.95rem;
      border-bottom: 1px solid #eee; background: #fafafa;
    }
    .panel-body { padding: 18px; flex: 1; display: flex; flex-direction: column; gap: 12px; }

    label { font-size: 0.85rem; font-weight: 500; color: #555; display: block; margin-bottom: 4px; }
    input[type="file"], select, input[type="text"], textarea {
      width: 100%; padding: 9px 12px; border: 1px solid #ddd; border-radius: 8px;
      font-size: 0.9rem; background: #fafafa; outline: none;
      transition: border-color .2s;
    }
    input[type="file"]:focus, select:focus, input[type="text"]:focus, textarea:focus {
      border-color: #4f46e5;
    }

    button {
      padding: 10px 18px; border: none; border-radius: 8px; cursor: pointer;
      font-size: 0.9rem; font-weight: 600; transition: opacity .15s, transform .1s;
    }
    button:active { transform: scale(.97); }
    button:disabled { opacity: .5; cursor: not-allowed; }
    .btn-primary { background: #4f46e5; color: #fff; }
    .btn-primary:hover:not(:disabled) { opacity: .9; }

    /* Status badge */
    .badge {
      display: inline-block; padding: 3px 10px; border-radius: 20px;
      font-size: 0.78rem; font-weight: 600;
    }
    .badge-queued    { background: #fef3c7; color: #92400e; }
    .badge-processing{ background: #dbeafe; color: #1e40af; }
    .badge-done      { background: #d1fae5; color: #065f46; }
    .badge-failed    { background: #fee2e2; color: #991b1b; }

    /* Upload result box */
    #upload-result {
      padding: 12px; border-radius: 8px; background: #f8fafc;
      border: 1px solid #e2e8f0; font-size: 0.85rem; display: none;
    }
    #upload-result .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
    #upload-result code { font-family: monospace; font-size: 0.8rem; color: #4f46e5; word-break: break-all; }

    /* Chat */
    #chat-session-id {
      font-family: monospace; font-size: 0.78rem; color: #6366f1;
      padding: 6px 10px; background: #eef2ff; border-radius: 6px;
      display: flex; align-items: center; justify-content: space-between;
    }
    #chat-session-id button {
      padding: 3px 8px; font-size: 0.75rem; background: #e0e7ff; color: #4338ca;
      border-radius: 5px;
    }

    #messages {
      flex: 1; min-height: 300px; max-height: 420px; overflow-y: auto;
      display: flex; flex-direction: column; gap: 10px;
      padding: 4px 0;
    }
    .msg { display: flex; flex-direction: column; max-width: 90%; }
    .msg.user { align-self: flex-end; align-items: flex-end; }
    .msg.assistant { align-self: flex-start; align-items: flex-start; }
    .msg-bubble {
      padding: 10px 14px; border-radius: 12px; font-size: 0.9rem;
      line-height: 1.5; white-space: pre-wrap;
    }
    .msg.user .msg-bubble { background: #4f46e5; color: #fff; border-bottom-right-radius: 3px; }
    .msg.assistant .msg-bubble { background: #f1f5f9; color: #1a1a2e; border-bottom-left-radius: 3px; }
    .msg-sources { font-size: 0.75rem; color: #94a3b8; margin-top: 3px; }

    .chat-input-row { display: flex; gap: 8px; }
    .chat-input-row textarea {
      flex: 1; resize: none; height: 44px; padding: 10px 12px; line-height: 1.4;
    }
    .chat-input-row button { align-self: flex-end; white-space: nowrap; }

    .thinking { font-size: 0.85rem; color: #94a3b8; font-style: italic; display: none; }
    .error-msg { color: #dc2626; font-size: 0.85rem; }
  </style>
</head>
<body>

<header>
  <div>
    <h1>Wellness Chatbot — Test UI</h1>
    <span>RAG · Django Ninja · LangGraph</span>
  </div>
</header>

<div class="layout">

  <!-- ── Upload Panel ── -->
  <div class="panel">
    <div class="panel-header">📄 Upload Tài Liệu</div>
    <div class="panel-body">

      <div>
        <label>Chọn file (PDF, DOCX, MD, CSV, TSV, JPG, PNG)</label>
        <input type="file" id="file-input" accept=".pdf,.docx,.md,.markdown,.csv,.tsv,.jpg,.jpeg,.png,.tiff" />
      </div>

      <div>
        <label>Loại tài liệu <span style="font-size:0.78rem;color:#94a3b8;font-weight:400">(tuỳ chọn — để trống để AI tự phân loại)</span></label>
        <input type="text" id="doc-type" placeholder="AI tự phân loại..." style="width:100%;padding:8px 10px;border:1px solid #e2e8f0;border-radius:8px;font-size:0.9rem;color:#475569" />
      </div>

      <button class="btn-primary" id="upload-btn" onclick="uploadFile()">Upload &amp; Xử lý</button>

      <div id="upload-result">
        <div class="row">
          <span><b>Job ID:</b></span>
          <code id="res-job-id"></code>
        </div>
        <div class="row">
          <span><b>Document ID:</b></span>
          <code id="res-doc-id"></code>
        </div>
        <div class="row">
          <span><b>Trạng thái:</b></span>
          <span id="res-status"></span>
        </div>
        <div id="res-error" class="error-msg" style="display:none"></div>
      </div>

      <!-- Upload history -->
      <div>
        <label>Lịch sử upload</label>
        <div id="upload-history" style="font-size:0.82rem; color:#64748b; max-height:140px; overflow-y:auto;"></div>
      </div>

    </div>
  </div>

  <!-- ── Chat Panel ── -->
  <div class="panel">
    <div class="panel-header">💬 Chat</div>
    <div class="panel-body">

      <div id="chat-session-id">
        <span>Session: <b id="session-display"></b></span>
        <button onclick="newSession()">New session</button>
      </div>

      <div id="messages"></div>

      <p class="thinking" id="thinking">Đang xử lý...</p>

      <div class="chat-input-row">
        <textarea id="chat-input" placeholder="Nhập câu hỏi... (Enter gửi, Shift+Enter xuống dòng)"
          onkeydown="handleKey(event)"></textarea>
        <button class="btn-primary" id="send-btn" onclick="sendMessage()">Gửi</button>
      </div>

    </div>
  </div>

  <!-- ── Documents Panel ── -->
  <div class="panel layout-full">
    <div class="panel-header" style="display:flex;justify-content:space-between;align-items:center">
      <span>📋 Quản lý Tài liệu</span>
      <button class="btn-refresh" onclick="loadDocuments()">↻ Làm mới</button>
    </div>
    <div class="panel-body">
      <div id="doc-table-wrap">
        <table class="doc-table">
          <thead>
            <tr>
              <th>Tên file</th>
              <th>Loại</th>
              <th>Ngày upload</th>
              <th>Trạng thái</th>
              <th style="width:80px">Thao tác</th>
            </tr>
          </thead>
          <tbody id="doc-tbody">
            <tr><td colspan="5" class="doc-empty">Đang tải...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

</div>

<script>
  // ── Helpers ──────────────────────────────────────────────────────────────
  function uuidv4() {
    return ([1e7]+-1e3+-4e3+-8e3+-1e11).replace(/[018]/g, c =>
      (c ^ crypto.getRandomValues(new Uint8Array(1))[0] & 15 >> c / 4).toString(16));
  }

  function badgeHtml(status) {
    const map = { queued: 'badge-queued', processing: 'badge-processing', done: 'badge-done', failed: 'badge-failed' };
    return `<span class="badge ${map[status] || 'badge-queued'}">${status}</span>`;
  }

  // ── Session ───────────────────────────────────────────────────────────────
  let sessionId = localStorage.getItem('chat_session_id') || uuidv4();

  function newSession() {
    sessionId = uuidv4();
    localStorage.setItem('chat_session_id', sessionId);
    document.getElementById('session-display').textContent = sessionId.slice(0, 18) + '…';
    document.getElementById('messages').innerHTML = '';
  }

  document.getElementById('session-display').textContent = sessionId.slice(0, 18) + '…';
  localStorage.setItem('chat_session_id', sessionId);

  // ── Upload ────────────────────────────────────────────────────────────────
  let pollTimer = null;

  async function uploadFile() {
    const fileInput = document.getElementById('file-input');
    const docType = document.getElementById('doc-type').value;
    if (!fileInput.files[0]) { alert('Vui lòng chọn file!'); return; }

    const btn = document.getElementById('upload-btn');
    btn.disabled = true;
    btn.textContent = 'Đang upload...';

    const form = new FormData();
    form.append('file', fileInput.files[0]);
    if (docType) form.append('doc_type', docType);

    try {
      const res = await fetch('/api/ingest/', { method: 'POST', body: form });
      if (!res.ok) throw new Error(`HTTP ${res.status}: ${await res.text()}`);
      const data = await res.json();

      const resultBox = document.getElementById('upload-result');
      resultBox.style.display = 'block';
      document.getElementById('res-job-id').textContent = data.job_id;
      document.getElementById('res-doc-id').textContent = data.document_id;
      document.getElementById('res-status').innerHTML = badgeHtml(data.status);
      document.getElementById('res-error').style.display = 'none';

      addUploadHistory(fileInput.files[0].name, data.job_id, data.status);
      pollJobStatus(data.job_id);
    } catch (err) {
      alert('Upload thất bại: ' + err.message);
    } finally {
      btn.disabled = false;
      btn.textContent = 'Upload & Xử lý';
    }
  }

  function pollJobStatus(jobId) {
    if (pollTimer) clearInterval(pollTimer);
    pollTimer = setInterval(async () => {
      try {
        const res = await fetch(`/api/ingest/status/${jobId}/`);
        if (!res.ok) return;
        const data = await res.json();
        document.getElementById('res-status').innerHTML = badgeHtml(data.status);
        updateUploadHistory(jobId, data.status);

        if (data.status === 'done') {
          clearInterval(pollTimer);
          loadDocuments();
        } else if (data.status === 'failed') {
          clearInterval(pollTimer);
          const errEl = document.getElementById('res-error');
          errEl.textContent = '❌ ' + (data.error || 'Xử lý thất bại');
          errEl.style.display = 'block';
        }
      } catch (_) {}
    }, 2000);
  }

  const uploadHistory = [];
  function addUploadHistory(filename, jobId, status) {
    uploadHistory.unshift({ filename, jobId, status });
    renderUploadHistory();
  }
  function updateUploadHistory(jobId, status) {
    const item = uploadHistory.find(h => h.jobId === jobId);
    if (item) { item.status = status; renderUploadHistory(); }
  }
  function renderUploadHistory() {
    document.getElementById('upload-history').innerHTML = uploadHistory.slice(0, 8).map(h =>
      `<div style="display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid #f1f5f9">
        <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:60%">${h.filename}</span>
        ${badgeHtml(h.status)}
      </div>`
    ).join('');
  }

  // ── Chat ──────────────────────────────────────────────────────────────────
  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  function appendMessage(role, content, sources = []) {
    const container = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    div.innerHTML = `<div class="msg-bubble">${escapeHtml(content)}</div>` +
      (sources.length ? `<div class="msg-sources">📚 ${sources.join(', ')}</div>` : '');
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── Document Management ───────────────────────────────────────────────────
  const DOC_TYPE_LABELS = { sotay: 'Sổ tay SV', ctdt: 'CTĐT', qd_ten: 'QĐ tên trường', qd_nhansu: 'QĐ nhân sự' };

  async function loadDocuments() {
    try {
      const res = await fetch('/api/ingest/documents/');
      if (!res.ok) return;
      const data = await res.json();
      renderDocTable(data.documents);
    } catch (_) {}
  }

  function renderDocTable(docs) {
    const tbody = document.getElementById('doc-tbody');
    if (!docs.length) {
      tbody.innerHTML = '<tr><td colspan="5" class="doc-empty">Chưa có tài liệu nào</td></tr>';
      return;
    }
    tbody.innerHTML = docs.map(doc => `
      <tr id="doc-row-${doc.id}">
        <td style="max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${doc.filename}">${doc.filename}</td>
        <td><span class="doc-type-badge">${DOC_TYPE_LABELS[doc.doc_type] || doc.doc_type || '—'}</span></td>
        <td>${doc.created_at}</td>
        <td>${badgeHtml(doc.job_status || 'queued')}</td>
        <td><button class="btn-delete" onclick="deleteDocument('${doc.id}', '${doc.filename.replace(/'/g, "\\'")}')">🗑 Xóa</button></td>
      </tr>
    `).join('');
  }

  async function deleteDocument(docId, filename) {
    if (!confirm(`Xóa tài liệu "${filename}"?\nThao tác này sẽ xóa cả vectors trong Qdrant.`)) return;
    try {
      const res = await fetch(`/api/ingest/documents/${docId}/`, { method: 'DELETE' });
      if (!res.ok) throw new Error(await res.text());
      const row = document.getElementById(`doc-row-${docId}`);
      if (row) row.remove();
      const tbody = document.getElementById('doc-tbody');
      if (!tbody.children.length) tbody.innerHTML = '<tr><td colspan="5" class="doc-empty">Chưa có tài liệu nào</td></tr>';
    } catch (err) {
      alert('Xóa thất bại: ' + err.message);
    }
  }

  // Load documents on page init and after upload
  loadDocuments();

  async function sendMessage() {
    const input = document.getElementById('chat-input');
    const msg = input.value.trim();
    if (!msg) return;

    const sendBtn = document.getElementById('send-btn');
    sendBtn.disabled = true;
    input.disabled = true;
    input.value = '';
    appendMessage('user', msg);

    document.getElementById('thinking').style.display = 'block';

    try {
      const res = await fetch('/api/chat/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ session_id: sessionId, message: msg }),
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}: ${await res.text()}`);
      const data = await res.json();
      appendMessage('assistant', data.answer, data.sources || []);
    } catch (err) {
      appendMessage('assistant', '❌ Lỗi: ' + err.message);
    } finally {
      document.getElementById('thinking').style.display = 'none';
      sendBtn.disabled = false;
      input.disabled = false;
      input.focus();
    }
  }
</script>

</body>
</html>
