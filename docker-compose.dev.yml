services:
  # ── PostgreSQL ─────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    env_file: .env.dev
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - backend

  # ── Qdrant ────────────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.12.1
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"  # REST API
      - "6334:6334"  # gRPC
    networks:
      - backend

  # ── MinIO bucket init (one-shot, dùng MinIO đang chạy sẵn) ───────────
  minio-init:
    image: minio/mc:RELEASE.2024-11-21T17-21-54Z
    env_file: .env.dev
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://host.docker.internal:9000 $${MINIO_ACCESS_KEY} $${MINIO_SECRET_KEY} &&
        mc mb --ignore-existing local/$${MINIO_BUCKET_RAW} &&
        mc mb --ignore-existing local/$${MINIO_BUCKET_PARSED} &&
        echo 'MinIO buckets ready.'
      "
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - backend

volumes:
  postgres_data:
  qdrant_data:

networks:
  backend:
    driver: bridge
