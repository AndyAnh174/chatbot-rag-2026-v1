[tool.ruff]
target-version = "py313"
line-length = 100
src = ["apps", "config"]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
    "N",   # pep8-naming
    "DJ",  # flake8-django
    "ASYNC", # flake8-async (bắt buộc vì dùng async views)
]
ignore = [
    "E501",   # line too long — để ruff format lo
    "B008",   # do not perform function calls in default arguments (ninja dùng File(...))
    "N999",   # invalid module name (apps/rag ok)
]

[tool.ruff.lint.per-file-ignores]
"*/migrations/*" = ["E501", "F401"]
"config/settings/*" = ["F401", "F403", "F405"]  # settings dùng wildcard import

[tool.ruff.lint.isort]
known-first-party = ["apps", "config"]
known-third-party = ["ninja", "django", "celery", "langchain", "langgraph", "qdrant_client"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "config.settings.dev"
asyncio_mode = "auto"
python_files = ["test_*.py", "*_test.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
