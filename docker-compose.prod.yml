x-django-common: &django-common
  build:
    context: .
    target: prod  # code baked into image, no bind-mount
  env_file: .env.prod
  restart: unless-stopped
  depends_on:
    db:
      condition: service_healthy
    redis:
      condition: service_healthy
    qdrant:
      condition: service_started
    minio:
      condition: service_healthy
  networks:
    - backend

services:
  # ── PostgreSQL ─────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    env_file: .env.prod
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - backend
    # No external port exposure in prod

  # ── Redis ──────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - backend

  # ── Qdrant ────────────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.12.1
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    networks:
      - backend
    # No external port in prod — accessed internally via http://qdrant:6333

  # ── MinIO ─────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    command: server /data --console-address ":9001"
    env_file: .env.prod
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  # ── MinIO bucket init (one-shot) ───────────────────────────────────────
  minio-init:
    image: minio/mc:RELEASE.2024-11-21T17-21-54Z
    depends_on:
      minio:
        condition: service_healthy
    env_file: .env.prod
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $${MINIO_ACCESS_KEY} $${MINIO_SECRET_KEY} &&
        mc mb --ignore-existing local/$${MINIO_BUCKET_RAW} &&
        mc mb --ignore-existing local/$${MINIO_BUCKET_PARSED} &&
        echo 'MinIO buckets ready.'
      "
    networks:
      - backend

  # ── Django (uvicorn) ──────────────────────────────────────────────────
  web:
    <<: *django-common
    ports:
      - "8000:8000"
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
    command: >
      sh -c "python manage.py migrate --noinput &&
             uvicorn config.asgi:application
               --host 0.0.0.0
               --port 8000
               --workers 4
               --log-level info"

  # ── Celery worker ─────────────────────────────────────────────────────
  celery:
    <<: *django-common
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
    command: >
      celery -A config.celery worker
             --loglevel=info
             --concurrency=4
             -Q default,ingestion

  # ── Celery beat ───────────────────────────────────────────────────────
  celery-beat:
    <<: *django-common
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
    command: celery -A config.celery beat --loglevel=info

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  minio_data:

networks:
  backend:
    driver: bridge
